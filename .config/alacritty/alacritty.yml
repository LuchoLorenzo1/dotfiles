# Colors (Darkside)
colors:
  primary:
    background: '#222324'
    foreground: '#BABABA'

  # Normal colors
  normal:
    black:    '#000000'
    red:      '#E8341C'
    green:    '#68C256'
    yellow:   '#F2D42C'
    blue:     '#1C98E8'
    magenta:  '#8E69C9'
    cyan:     '#1C98E8'
    white:    '#BABABA'

  # Bright colors
  bright:
    black:    '#666666'
    red:      '#E05A4F'
    green:    '#77B869'
    yellow:   '#EFD64B'
    blue:     '#387CD3'
    magenta:  '#957BBE'
    cyan:     '#3D97E2'
    white:    '#BABABA'
font:
  bold:
    family: JetBrains Mono Nerd Font
  italic:
    family: JetBrains Mono Nerd Font
  normal:
    family: JetBrains Mono Nerd Font
  offset:
    x: 0
    y: 0
  size: 14

window:
  opacity: 1
  # Window dimensions in character columns and lines
  # (changes require restart)

  # dimensions:
  #   columns: 160
  #   lines: 48

  # Adds this many blank pixels of padding around the window
  # Units are physical pixels; this is not DPI aware.
  # (change requires restart)
  padding:
    x: 0
    y: 0

   # Spread additional padding evenly around the terminal content.
  dynamic_padding: false
  dynamic_title: true

  decorations: none

draw_bold_text_with_bright_colors: true

env:
  TERM: xterm-256color
